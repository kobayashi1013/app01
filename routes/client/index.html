<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>掲示板</title>
    </head>
    <body>
        <h1>書き込み</h1>
        <form action="/" method="POST">

            <button type="submit">送信</button>
        </form>
    </body>
</html>
